name: leto
description: Лето — Здоровье и привычки
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  solar_icons: ^0.0.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-Regular.ttf
          weight: 400
        - asset: fonts/Outfit-Medium.ttf
          weight: 500
        - asset: fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: fonts/Outfit-Bold.ttf
          weight: 700
        - asset: fonts/Outfit-ExtraBold.ttf
          weight: 800
        - asset: fonts/Outfit-Black.ttf
          weight: 900
