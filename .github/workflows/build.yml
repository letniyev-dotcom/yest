name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Download Outfit fonts
        run: |
          mkdir -p fonts
          BASE="https://github.com/googlefonts/outfit/raw/main/fonts/ttf"
          curl -sL "$BASE/Outfit-Regular.ttf"    -o fonts/Outfit-Regular.ttf
          curl -sL "$BASE/Outfit-Medium.ttf"     -o fonts/Outfit-Medium.ttf
          curl -sL "$BASE/Outfit-SemiBold.ttf"   -o fonts/Outfit-SemiBold.ttf
          curl -sL "$BASE/Outfit-Bold.ttf"       -o fonts/Outfit-Bold.ttf
          curl -sL "$BASE/Outfit-ExtraBold.ttf"  -o fonts/Outfit-ExtraBold.ttf
          curl -sL "$BASE/Outfit-Black.ttf"      -o fonts/Outfit-Black.ttf
          echo "Fonts downloaded:"
          ls -lh fonts/

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: leto-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: leto-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
